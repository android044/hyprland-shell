name: Create release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Create packages
        run: |
          mkdir -p release
          rsync -av \
            --exclude='release' \
            --exclude='.*' \
            . release
          tar -czf hyprland-shell-${{ github.ref_name }}.tar.gz release
          cp hyprland-shell-${{ github.ref_name }}.tar.gz hyprland-shell-latest.tar.gz

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hyprland-shell-${{ github.ref_name }}.tar.gz
            hyprland-shell-latest.tar.gz
          generate_release_notes: true
      
      - name: Update stable branch
        run: |
          git branch -f stable "$GITHUB_SHA"
          git push origin stable --force
